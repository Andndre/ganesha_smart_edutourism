services:
  penglipuran-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: penglipuran-app
    restart: unless-stopped
    # --- JIKA MENGGUNAKAN TRAEFIK HOSTINGER (HTTPS / MULTI-PROJECT) ---
    # 1. Hapus/comment bagian ports di bawah ini agar tidak bentrok dengan Traefik:
    ports:
      - "${APP_PORT:-80}:80"
    # 2. Hapus tanda '#' (uncomment) pada baris labels di bawah ini untuk mengaktifkan Traefik:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.penglipuran.rule=Host(`domain-anda.com`)"
    #   - "traefik.http.routers.penglipuran.entrypoints=websecure"
    #   - "traefik.http.routers.penglipuran.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.penglipuran.loadbalancer.server.port=80"
    # -----------------------------------------------------------------
    volumes:
      - ./.env:/var/www/.env
      - penglipuran-storage:/var/www/storage
    depends_on:
      - penglipuran-db
      - penglipuran-ors
    networks:
      - penglipuran-network
      # 3. Hapus tanda '#' di bawah ini jika menggunakan Traefik agar terhubung dengan proxy Hostinger:
      # - traefik-proxy

  penglipuran-queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: penglipuran-queue
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./.env:/var/www/.env
      - penglipuran-storage:/var/www/storage
    depends_on:
      - penglipuran-db
    networks:
      - penglipuran-network

  penglipuran-db:
    image: mysql:8.0
    container_name: penglipuran-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_ganesha_smart_edutourism}
      MYSQL_USER: ${DB_USERNAME:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-999}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_here}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - penglipuran-db-data:/var/lib/mysql
    networks:
      - penglipuran-network

  penglipuran-ors:
    image: openrouteservice/openrouteservice:latest
    container_name: penglipuran-ors
    restart: unless-stopped
    ports:
      - "${ORS_PORT:-8080}:8082"
    volumes:
      - ./openrouteservice/graphs:/home/ors/graphs
      - ./openrouteservice/config:/home/ors/config
      - ./openrouteservice/files:/home/ors/files
      - ./openrouteservice/logs:/home/ors/logs
    environment:
      - BUILD_GRAPHS=True
      - XMS=512m
      - XMX=1g
      - ORS_CONFIG_LOCATION=/home/ors/config/ors-config.yml
    networks:
      - penglipuran-network

  penglipuran-pma:
    image: phpmyadmin:latest
    container_name: penglipuran-pma
    restart: unless-stopped
    # --- JIKA MENGGUNAKAN TRAEFIK HOSTINGER ---
    # 1. Hapus/comment bagian ports di bawah ini:
    ports:
      - "${PMA_PORT:-8081}:80"
    # 2. Hapus tanda '#' (uncomment) pada labels di bawah ini (misal untuk pma.domain-anda.com):
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.penglipuran-pma.rule=Host(`pma.domain-anda.com`)"
    #   - "traefik.http.routers.penglipuran-pma.entrypoints=websecure"
    #   - "traefik.http.routers.penglipuran-pma.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.penglipuran-pma.loadbalancer.server.port=80"
    # ------------------------------------------
    environment:
      PMA_HOST: penglipuran-db
      UPLOAD_LIMIT: 64M
    depends_on:
      - penglipuran-db
    networks:
      - penglipuran-network
      # 3. Hapus tanda '#' di bawah ini jika menggunakan Traefik:
      # - traefik-proxy


networks:
  penglipuran-network:
    driver: bridge
  # traefik-proxy:
  #   external: true

volumes:
  penglipuran-storage:
  penglipuran-db-data:
