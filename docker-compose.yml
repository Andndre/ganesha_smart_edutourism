services:
  penglipuran-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-penglipuran}-app
    restart: unless-stopped
    # --- JIKA MENGGUNAKAN TRAEFIK HOSTINGER (HTTPS / MULTI-PROJECT) ---
    # Ports dinonaktifkan agar port 80 tidak bentrok dengan Traefik pada VPS host:
    # ports:
    #   - "${APP_PORT:-80}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}.rule=Host(`${APP_DOMAIN:-penglipuran.digowave.com}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-penglipuran}.loadbalancer.server.port=80"
    # -----------------------------------------------------------------
    volumes:
      - ./.env:/var/www/.env
      - penglipuran-storage:/var/www/storage
    depends_on:
      - penglipuran-db
      - penglipuran-ors
      - penglipuran-redis
    networks:
      - penglipuran-network

  penglipuran-queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-penglipuran}-queue
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./.env:/var/www/.env
      - penglipuran-storage:/var/www/storage
    depends_on:
      - penglipuran-db
      - penglipuran-redis
    networks:
      - penglipuran-network

  penglipuran-reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-penglipuran}-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    ports:
      - "${REVERB_PORT:-8081}:8081"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}-ws.rule=Host(`${APP_DOMAIN:-penglipuran.digowave.com}`) && PathPrefix(`/app`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}-ws.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}-ws.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-penglipuran}-ws.loadbalancer.server.port=8081"
    volumes:
      - ./.env:/var/www/.env
    depends_on:
      - penglipuran-db
      - penglipuran-redis
    networks:
      - penglipuran-network

  penglipuran-db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-penglipuran}-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_ganesha_smart_edutourism}
      MYSQL_USER: ${DB_USERNAME:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-999}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_here}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - penglipuran-db-data:/var/lib/mysql
    networks:
      - penglipuran-network

  penglipuran-redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-penglipuran}-redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - penglipuran-redis-data:/data
    networks:
      - penglipuran-network

  penglipuran-ors:
    image: openrouteservice/openrouteservice:latest
    container_name: ${COMPOSE_PROJECT_NAME:-penglipuran}-ors
    restart: unless-stopped
    ports:
      - "${ORS_PORT:-8080}:8082"
    volumes:
      - ./openrouteservice/graphs:/home/ors/graphs
      - ./openrouteservice/config:/home/ors/config
      - ./openrouteservice/files:/home/ors/files
      - ./openrouteservice/logs:/home/ors/logs
    environment:
      - BUILD_GRAPHS=True
      - XMS=512m
      - XMX=1g
      - ORS_CONFIG_LOCATION=/home/ors/config/ors-config.yml
    networks:
      - penglipuran-network

  penglipuran-pma:
    image: phpmyadmin:latest
    container_name: ${COMPOSE_PROJECT_NAME:-penglipuran}-pma
    restart: unless-stopped
    # Ports dinonaktifkan agar port 8081 tidak terekspos secara publik di luar Traefik:
    # ports:
    #   - "${PMA_PORT:-8081}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}-pma.rule=Host(`${PMA_DOMAIN:-pma-penglipuran.digowave.com}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}-pma.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-penglipuran}-pma.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-penglipuran}-pma.loadbalancer.server.port=80"
    environment:
      PMA_HOST: ${COMPOSE_PROJECT_NAME:-penglipuran}-db
      UPLOAD_LIMIT: 64M
    depends_on:
      - penglipuran-db
    networks:
      - penglipuran-network


networks:
  penglipuran-network:
    driver: bridge

volumes:
  penglipuran-storage:
  penglipuran-db-data:
  penglipuran-redis-data:
